{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">

    Add Product

</h2>

<h5>

    Company :
    {{ company.company_name }}

</h5>

<form method="POST">

    <div class="mb-3">

        <label>Product Name</label>

        <input name="product_name" class="form-control" required>

    </div>

    <div class="mb-3">

        <label>Category</label>

        <input name="product_category" class="form-control">

    </div>

    <div class="row">

        <div class="col-md-6">

            <label>Wholesale Price</label>

            <input type="number" step="0.01" name="wholesale_price" class="form-control">

        </div>

        <div class="col-md-6">

            <label>Retail Price</label>

            <input type="number" step="0.01" name="retail_price" class="form-control">

        </div>

    </div>

    <br>

    <div class="row">

        <div class="col-md-6">

            <label>MOQ</label>

            <input type="number" name="moq" class="form-control">

        </div>

        <div class="col-md-6">

            <label>Material</label>

            <input name="material" class="form-control">

        </div>

    </div>

    <br>

    <div class="mb-3">

        <label>Description</label>

        <textarea name="description" class="form-control" rows="5"></textarea>

    </div>

    <button class="btn btn-success">

        Save Product

    </button>

</form>

{% endblock %}
